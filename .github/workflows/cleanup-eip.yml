name: Cleanup Stale EIPs (one-time)

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Disassociate stale EIPs
        run: |
          aws ec2 disassociate-address --association-id eipassoc-07ecfdabe08c881f9 || true
          aws ec2 disassociate-address --association-id eipassoc-0f29cbc57890d0cbc || true

      - name: Release EIPs
        run: |
          aws ec2 release-address --allocation-id eipalloc-02abe7d2382e93f32 || true
          aws ec2 release-address --allocation-id eipalloc-0d75c5397619e435c || true

      - name: Verify cleanup
        run: |
          aws ec2 describe-addresses \
            --filters "Name=domain,Values=vpc" \
            --query 'Addresses[*].{AllocationId:AllocationId,PublicIp:PublicIp,AssocId:AssociationId}'
