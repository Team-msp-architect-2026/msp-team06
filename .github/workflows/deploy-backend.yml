name: Deploy Backend to ECR & EKS

on:
  push:
    branches: [dev]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push FastAPI image to ECR
        env:
          ECR_REGISTRY: 611058323802.dkr.ecr.eu-west-3.amazonaws.com
          ECR_REPOSITORY: homelens-fastapi
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Build, tag, and push Celery Worker image to ECR
        env:
          ECR_REGISTRY: 611058323802.dkr.ecr.eu-west-3.amazonaws.com
          ECR_REPOSITORY: homelens-celeryworker
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend -f ./backend/Dockerfile.celery
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region eu-west-3 --name homelens-dev-eks

      - name: Deploy FastAPI to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: homelens-fastapi
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/fastapi \
            fastapi=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -n homelens
          kubectl rollout status deployment/fastapi -n homelens

      - name: Deploy Celery Worker to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: homelens-celeryworker
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/celery-worker \
            celery-worker=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -n homelens

      - name: Run Alembic Migration
        run: |
          RDS_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id homelens/dev/rds/postgres \
            --query SecretString --output text)
          DB_HOST=$(echo $RDS_SECRET | python3 -c "import sys,json;print(json.load(sys.stdin)['host'])")
          DB_NAME=$(echo $RDS_SECRET | python3 -c "import sys,json;print(json.load(sys.stdin)['dbname'])")
          DB_USER=$(echo $RDS_SECRET | python3 -c "import sys,json;print(json.load(sys.stdin)['username'])")
          PW_ARN=$(echo $RDS_SECRET | python3 -c "import sys,json;print(json.load(sys.stdin)['password_secret_arn'])")
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "$PW_ARN" \
            --query SecretString --output text)
          DB_PASS=$(echo $SECRET_JSON | python3 -c "import sys,json;print(json.load(sys.stdin)['password'])")
          POD=$(kubectl get pod -n homelens -l app=fastapi -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n homelens $POD -- bash -c "DATABASE_URL='postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:5432/${DB_NAME}' alembic upgrade heads"