name: Data Pipeline Deploy

on:
  push:
    branches:
      - dev
    paths:
      - 'data-pipeline/**'

env:
  AWS_REGION: eu-west-3

jobs:
  deploy-lambdas:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Lambda 함수 배포 (전체)
        working-directory: data-pipeline/lambdas
        run: |
          for lambda_dir in */; do
            lambda_name="${lambda_dir%/}"
            echo "📦 $lambda_name 배포 중..."
            cd $lambda_name
            zip -r ../../../${lambda_name}.zip .
            cd ..
            aws lambda update-function-code \
              --function-name homelens-${lambda_name} \
              --zip-file fileb://../../${lambda_name}.zip \
              --region ${{ env.AWS_REGION }}
            echo "✅ $lambda_name 배포 완료"
          done
          