name: 🗓️ 스프린트 미팅 (Sprint Meeting)
description: 주간 스프린트 계획/회고/데일리 미팅 기록용 이슈
title: "[Sprint] Week __ — YYYY-MM-DD"
labels: ["type:meeting", "sprint"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🗓️ 스프린트 미팅
        1주 스프린트 기준. Planning(월) → Daily(매일) → Review/Retro(금) 형식.
        팀 전원 참석이 원칙입니다.

  - type: dropdown
    id: type
    attributes:
      label: 📍 미팅 종류
      options:
        - Planning (스프린트 킥오프)
        - Daily Standup
        - Review (결과 시연)
        - Retrospective (회고)
      default: 0
    validations:
      required: true

  - type: input
    id: sprint_number
    attributes:
      label: 🔢 스프린트 번호
      placeholder: "예) Sprint 03"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: 📅 일시
      placeholder: "2026-04-27 10:00 ~ 11:00"
    validations:
      required: true

  - type: input
    id: attendees
    attributes:
      label: 👥 참석자
      placeholder: "@강인호 @박서우 @이성훈"
    validations:
      required: true

  - type: textarea
    id: sprint_goal
    attributes:
      label: 🎯 스프린트 목표 (Planning 시 작성)
      description: 이번 주 끝날 때 무엇이 되어 있어야 하는가
      placeholder: "예) ArgoCD로 팀 레포 자동 배포 완료 + Grafana 대시보드 1개 구축"

  - type: textarea
    id: commitments
    attributes:
      label: ✅ 이번 스프린트 커밋 이슈 (Planning)
      description: 이번 주에 반드시 Done까지 가는 이슈 목록
      value: |
        - [ ] #
        - [ ] #
        - [ ] #

  - type: textarea
    id: daily
    attributes:
      label: 🌅 Daily Standup (해당 시 작성)
      description: "멤버별: 어제 한 일 / 오늘 할 일 / 블로커"
      value: |
        ### 강인호
        - **어제:**
        - **오늘:**
        - **블로커:**

        ### 박서우
        - **어제:**
        - **오늘:**
        - **블로커:**

  - type: textarea
    id: review
    attributes:
      label: 🎬 Review — 완료/미완료 (Review 시 작성)
      value: |
        **✅ 완료:**
        - #

        **⏸️ 이월:**
        - # (사유: )

        **📊 달성률:** __ / __ (__%)

  - type: textarea
    id: retro
    attributes:
      label: 🔄 Retrospective — KPT (Retrospective 시 작성)
      value: |
        ### 🟢 Keep (잘한 것 · 계속할 것)
        -

        ### 🔴 Problem (문제점)
        -

        ### 🟡 Try (다음 스프린트에서 시도할 것)
        -

  - type: textarea
    id: action_items
    attributes:
      label: 📝 액션 아이템
      description: 미팅에서 도출된 후속 작업 (별도 이슈로 등록 권장)
      value: |
        - [ ] (담당: @, 기한: )
