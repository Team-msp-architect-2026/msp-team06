name: 📋 일감 등록 (Task)
description: 새 작업/기능 개발/인프라 구성 등 일반 작업을 등록합니다.
title: "[Task] "
labels: ["type:task"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📋 일감 등록
        작업을 구체적이고 실행 가능한 단위로 작성해주세요.
        완료 조건(DoD)이 명확해야 Done으로 이동할 수 있습니다.

  - type: textarea
    id: goal
    attributes:
      label: 🎯 목표 (What & Why)
      description: 무엇을 왜 해야 하는지 1-3문장으로 작성
      placeholder: |
        예) ArgoCD가 msp-team01의 k8s/ 디렉토리를 자동 동기화하도록 Application 리소스를 생성한다.
        GitOps 기반 무중단 배포를 가능하게 하기 위함.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ 완료 조건 (Definition of Done)
      description: 체크리스트 형태로 작성. 모두 체크되면 이슈 종료.
      value: |
        - [ ]
        - [ ]
        - [ ] PR 작성 및 리뷰 1명 이상 승인
        - [ ] README 또는 관련 문서 업데이트
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 🗂️ 영역 (Area)
      multiple: true
      options:
        - k8s (Kubernetes/인프라)
        - gitops (ArgoCD/GitOps)
        - monitoring (Prometheus/Grafana/Loki)
        - ci-cd (CI/CD 파이프라인)
        - app-frontend (프론트엔드)
        - app-backend (백엔드)
        - ai (AI/ML 서빙)
        - security (보안/SealedSecrets/NetworkPolicy)
        - docs (문서)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 🔥 우선순위
      options:
        - P0-critical (즉시 처리)
        - P1-high (이번 스프린트)
        - P2-medium (다음 스프린트)
        - P3-low (백로그)
      default: 2
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: ⏱️ 예상 소요 시간
      description: 본인이 예상하는 작업 시간 (시간 단위)
      placeholder: "예) 4h, 1d, 2d"

  - type: input
    id: milestone
    attributes:
      label: 🏁 연관 Milestone
      description: "예) M2. App MVP"
      placeholder: "M1 ~ M6 중 해당 Phase"

  - type: textarea
    id: references
    attributes:
      label: 🔗 참고 자료
      description: 관련 이슈, PR, 문서 링크
      placeholder: |
        - #123
        - https://...
