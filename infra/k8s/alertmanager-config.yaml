apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-kube-prometheus-stack-alertmanager
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-warning'
      routes:
        - matchers:
            - severity="critical"
          receiver: 'slack-critical'
          continue: false

    receivers:
      - name: 'slack-warning'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/homelens-slack-webhook/url'
            channel: '#alerts'
            send_resolved: true
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
            icon_emoji: ':warning:'
            title: '[WARNING] {{ .GroupLabels.alertname }}{{ if eq .Status "resolved" }} — 해소됨{{ end }}'
            text: |
              {{ range .Alerts }}
              • *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}

      - name: 'slack-critical'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/homelens-slack-webhook/url'
            channel: '#alerts'
            send_resolved: true
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            icon_emoji: ':fire:'
            title: '[CRITICAL] {{ .GroupLabels.alertname }}{{ if eq .Status "resolved" }} — 해소됨{{ end }}'
            text: |
              {{ range .Alerts }}
              • *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname']
